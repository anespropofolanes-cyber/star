<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易經三十日｜每日學習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --bg:        #eeede9;
    --bg2:       #ffffff;
    --bg3:       #f5f4f0;
    --border:    #d8d8d2;
    --border2:   #c0c0b8;
    --text:      #1c1c1c;
    --text-mid:  #666660;
    --text-dim:  #aaaaaa;
    --white:     #ffffff;
    --accent:    #222222;
    --accent2:   #888880;
    --done:      #3d6b50;
    --done-bg:   rgba(61,107,80,0.07);
    --sb-bg:     #1a1a1c;
    --sb-border: #2c2c30;
    --sb-text:   #909098;
    --sb-dim:    #484850;
    --radius:    3px;
    --shadow:    0 1px 4px rgba(0,0,0,0.06);
    --fs: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: var(--fs);
    line-height: 1.75;
    min-height: 100vh;
    font-weight: 300;
  }

  /* ── Stars canvas ── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── Topbar wrapper (sticky both rows) ── */
  .topbar-wrapper {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--sb-bg);
  }

  /* ── Brand bar (top row) ── */
  .topbar-brand-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--sb-border);
  }

  .topbar-logo {
    width: 22px;
    height: 22px;
    object-fit: contain;
    filter: invert(1) brightness(0.85);
    flex-shrink: 0;
  }

  .topbar-brand-bar h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--white);
    white-space: nowrap;
  }

  .topbar-brand-sub {
    font-size: 10px;
    color: var(--sb-dim);
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  /* ── Topbar nav row (bottom row) ── */
  .topbar {
    background: var(--sb-bg);
    border-bottom: 1px solid var(--sb-border);
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0;
    overflow: hidden;
  }

  .topbar-nav {
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 4px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 300;
    color: var(--sb-text);
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .nav-btn:hover { color: var(--white); background: rgba(255,255,255,0.04); }
  .nav-btn.active {
    color: var(--white);
    border-bottom-color: #c8c8c0;
    font-weight: 700;
  }

  .topbar-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    border-left: 1px solid var(--sb-border);
    flex-shrink: 0;
    height: 100%;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 8px;
    color: var(--sb-dim);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .stat-val {
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Serif TC', serif;
    color: var(--white);
    line-height: 1.2;
    white-space: nowrap;
  }

  .topbar-progress {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .progress-bar-wrap {
    width: 52px;
    height: 2px;
    background: var(--sb-border);
    border-radius: 1px;
  }

  .progress-bar-fill {
    height: 100%;
    background: #b0b0a8;
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    background: var(--bg);
    box-sizing: border-box;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── Header ── */
  .page-header {
    margin-bottom: 32px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }

  .page-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .page-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.7143em;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .page-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  .today-quote {
    background: rgba(0,0,0,0.03);
    border-left: 2px solid var(--border2);
    padding: 12px 18px;
    margin-top: 18px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9286em;
    font-weight: 300;
    color: var(--text-mid);
    letter-spacing: 0.06em;
  }

  /* ── Today content card ── */
  .content-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .content-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .content-card-header-left { display: flex; align-items: center; gap: 12px; }
  .content-symbol { font-size: 1.5714em; line-height: 1; color: var(--text); font-family: 'Noto Serif TC', serif; }
  .content-day-label { font-size: 9px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; font-weight: 300; margin-bottom: 2px; }
  .content-card-title { font-family: 'Noto Serif TC', serif; font-size: 1.0714em; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
  .content-keyword { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; border: 1px solid var(--border2); padding: 2px 8px; border-radius: 1px; font-weight: 300; }
  .content-toggle-icon { font-size: 11px; color: var(--text-dim); transition: transform 0.2s; }
  .content-toggle-icon.open { transform: rotate(180deg); }
  .content-body { display: none; padding: 20px 22px; }
  .content-body.open { display: block; }
  .content-block { margin-bottom: 18px; }
  .content-block:last-child { margin-bottom: 0; }
  .content-block-label { font-size: 9px; letter-spacing: 0.16em; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .content-block-text { font-size: 0.9286em; font-weight: 300; color: var(--text); line-height: 1.85; }
  .content-quote-block { background: var(--bg3); border-left: 2px solid var(--border2); padding: 10px 16px; margin-top: 16px; font-family: 'Noto Serif TC', serif; font-size: 0.9286em; font-weight: 300; color: var(--text-mid); letter-spacing: 0.04em; }
  .content-interaction { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-top: 4px; }
  .content-interaction-title { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .content-interaction-desc { font-size: 11px; color: var(--text-mid); font-weight: 300; line-height: 1.6; }
  /* choice */
  .choice-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .choice-opt { padding: 6px 14px; border: 1px solid var(--border2); border-radius: 1px; background: #fff; font-family: inherit; font-size: 0.8571em; font-weight: 300; color: var(--text); cursor: pointer; transition: all 0.15s; }
  .choice-opt:hover { border-color: var(--accent2); }
  .choice-opt.selected { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
  /* lineBuilder */
  .line-builder { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .yao-toggle { display: flex; align-items: center; gap: 10px; }
  .yao-btn { padding: 6px 20px; border: 1px solid var(--border2); border-radius: 1px; background: #fff; font-family: 'Noto Serif TC', serif; font-size: 0.9286em; cursor: pointer; color: var(--text); min-width: 60px; text-align: center; transition: all 0.15s; }
  .yao-btn:hover { background: var(--bg3); }
  .yao-label { font-size: 10px; color: var(--text-dim); font-weight: 300; }
  .gua-result { font-size: 1.8571em; font-family: 'Noto Serif TC', serif; margin-top: 6px; color: var(--text); }
  /* sections accordion */
  .section-accordion { margin-top: 4px; display: flex; flex-direction: column; gap: 4px; }
  .acc-item { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .acc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; background: var(--bg3); user-select: none;
    font-size: 0.8571em; font-weight: 700; color: var(--text); letter-spacing: 0.03em;
    transition: background 0.12s;
  }
  .acc-header:hover { background: var(--border); }
  .acc-arrow { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; }
  .acc-arrow.open { transform: rotate(180deg); }
  .acc-body { display: none; padding: 12px 14px; background: var(--bg2); }
  .acc-body.open { display: block; }
  .acc-para {
    font-size: 0.9286em; font-weight: 300; color: var(--text); line-height: 1.85;
    margin-bottom: 8px;
  }
  .acc-para:last-child { margin-bottom: 0; }
  /* special headings */
  .acc-item.is-quote .acc-body { background: var(--bg3); border-left: 2px solid var(--border2); }
  .acc-item.is-quote .acc-para { font-family: 'Noto Serif TC', serif; color: var(--text-mid); }
  .acc-item.is-case .acc-header { background: rgba(61,107,80,0.06); }

  /* gua card grid */
  .gua-card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 6px; }
  .gua-card {
    aspect-ratio: 1;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: border-color 0.15s;
  }
  .gua-card:hover { border-color: var(--accent2); }
  .gua-card-front {
    font-size: 1.5714em; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
  .gua-card-back {
    display: none;
    font-size: 11px; font-weight: 300; color: var(--text);
    text-align: center; padding: 4px; line-height: 1.5;
    width: 100%; height: 100%;
    align-items: center; justify-content: center;
  }
  .gua-card.flipped { background: var(--accent); border-color: var(--accent); }
  .gua-card.flipped .gua-card-front { display: none; }
  .gua-card.flipped .gua-card-back { display: flex; color: #fff; }

  /* guided practice steps */
  .gp-steps { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .gp-step {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg2);
    cursor: pointer;
    font-size: 0.8571em; font-weight: 300; color: var(--text);
    transition: all 0.15s;
  }
  .gp-step:hover { border-color: var(--accent2); }
  .gp-step.done { background: var(--done-bg); border-color: rgba(61,107,80,0.3); color: var(--done); }
  .gp-check {
    width: 18px; height: 18px; min-width: 18px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    background: transparent; transition: all 0.15s;
  }
  .gp-step.done .gp-check { background: var(--done); border-color: var(--done); }
  .goals-list { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
  .goal-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.8571em; font-weight: 300; color: var(--text); line-height: 1.6; }
  .goal-item::before { content: '○'; color: var(--text-dim); flex-shrink: 0; font-size: 10px; margin-top: 3px; }
  .quiz-block { margin-top: 6px; }
  .quiz-question { font-size: 0.9286em; font-weight: 300; color: var(--text); line-height: 1.7; margin-bottom: 10px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 6px; }
  .quiz-opt {
    padding: 9px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg2);
    font-family: inherit;
    font-size: 0.8571em;
    font-weight: 300;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .quiz-opt:hover:not([disabled]) { border-color: var(--accent2); background: var(--bg3); }
  .quiz-opt.correct { background: var(--done-bg); border-color: var(--done); color: var(--done); font-weight: 700; }
  .quiz-opt.wrong { background: rgba(180,60,60,0.06); border-color: rgba(180,60,60,0.4); color: #8b3030; }
  .quiz-opt[disabled] { cursor: default; }
  .quiz-explanation {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg3);
    border-left: 2px solid var(--done);
    font-size: 0.8571em;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.6;
    display: none;
  }
  .quiz-explanation.show { display: block; }
  /* practice list */
  .practice-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .practice-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 0.8571em;
    font-weight: 300;
    color: var(--text);
    line-height: 1.6;
  }
  .practice-item::before { content: '›'; color: var(--text-dim); flex-shrink: 0; margin-top: 1px; }
  /* goal */
  .goal-block {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.9286em;
    font-weight: 300;
    color: var(--text);
    line-height: 1.7;
    margin-top: 4px;
  }
  .coin-rows { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .coin-row-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-mid); font-weight: 300; }
  .coin-throw-btn { padding: 5px 14px; border: 1px solid var(--border2); border-radius: 1px; background: #fff; font-family: inherit; font-size: 11px; cursor: pointer; color: var(--text); transition: all 0.15s; }
  .coin-throw-btn:hover { background: var(--bg3); }
  .coin-yao { font-size: 1.1429em; font-family: 'Noto Serif TC', serif; min-width: 20px; }
  .coin-yao.yang { color: var(--text); }
  .coin-yao.yin { color: var(--text-mid); }

  .topbar-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .ctrl-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--sb-border);
    background: rgba(255,255,255,0.06);
    color: var(--sb-text);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Serif TC', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .ctrl-btn:hover {
    background: rgba(255,255,255,0.14);
    color: var(--white);
    border-color: rgba(255,255,255,0.3);
  }

  .ctrl-btn.active {
    background: rgba(255,255,255,0.18);
    color: var(--white);
    border-color: rgba(255,255,255,0.4);
  }

  .ctrl-btn.size-btn {
    width: 36px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0;
  }

  /* ── Font modes ── */
  body.font-serif {
    font-family: 'Noto Serif TC', 'STSong', 'BiauKai', serif;
  }

  /* ── Dark / Cosmic mode ── */
  body.dark-mode {
    --bg:       #090914;
    --bg2:      #13132a;
    --bg3:      #1a1a36;
    --border:   #252545;
    --border2:  #323260;
    --text:     #e8eaff;
    --text-mid: #9898cc;
    --text-dim: #5858a0;
    --accent:   #a090ff;
    --accent2:  #6655cc;
    --done:     #55d499;
    --done-bg:  rgba(85,212,153,0.08);
    --shadow:   0 4px 24px rgba(0,0,20,0.6);
  }

  body.dark-mode .topbar-wrapper { background: #020208; }
  body.dark-mode .topbar { background: #020208; border-bottom-color: #0f0f28; }
  body.dark-mode .topbar-brand-bar { border-bottom-color: #0f0f28; }

  /* Cosmic glow effects in dark mode */
  body.dark-mode .today-card,
  body.dark-mode .content-card,
  body.dark-mode .diary-card,
  body.dark-mode .review-card {
    background: #13132a !important;
    border-color: #252545 !important;
    box-shadow: 0 0 0 1px rgba(100,80,220,0.18), 0 4px 28px rgba(40,20,120,0.2);
  }

  body.dark-mode .progress-bar-fill {
    background: linear-gradient(90deg, #5533dd, #9966ff, #cc88ff);
    box-shadow: 0 0 14px rgba(150,100,255,0.8), 0 0 4px rgba(200,150,255,0.5);
  }

  body.dark-mode .today-quote {
    border-left-color: #6644cc;
    background: rgba(80,60,180,0.1);
    color: #b8aaee;
    letter-spacing: 0.06em;
  }

  body.dark-mode .task-check.checked {
    background: var(--done);
    border-color: var(--done);
    box-shadow: 0 0 10px rgba(85,212,153,0.6), 0 0 4px rgba(85,212,153,0.4);
  }

  body.dark-mode .acc-header {
    background: rgba(22,20,52,0.98);
    color: var(--text);
  }
  body.dark-mode .acc-header:hover { background: rgba(32,28,66,1); }
  body.dark-mode .acc-item.is-quote .acc-body { border-left-color: #6644cc; background: rgba(40,28,90,0.35); }
  body.dark-mode .acc-item.is-case .acc-header { background: rgba(16,34,28,0.95); }

  body.dark-mode .diary-day-cell {
    background: rgba(20,20,44,0.9);
    border-color: #252550;
  }

  body.dark-mode .diary-day-cell.active {
    background: linear-gradient(135deg, #3322aa, #6644cc, #8855ee);
    border-color: #8855ee;
    box-shadow: 0 0 16px rgba(120,80,240,0.5), 0 0 6px rgba(180,140,255,0.3);
  }

  body.dark-mode .btn-primary {
    background: linear-gradient(135deg, #5533cc, #8855ee);
    box-shadow: 0 2px 16px rgba(100,60,240,0.4);
  }
  body.dark-mode .btn-primary:hover { background: linear-gradient(135deg, #6644dd, #9966ff); }

  body.dark-mode .filter-btn.active {
    background: linear-gradient(135deg, #5533cc, #8855ee);
    border-color: #9966ff;
    color: #fff;
    box-shadow: 0 0 10px rgba(100,60,240,0.35);
  }

  body.dark-mode .gua-card { background: rgba(20,20,44,0.95); border-color: #282860; }
  body.dark-mode .gua-card.flipped {
    background: linear-gradient(135deg, #221166, #5533bb);
    box-shadow: 0 0 20px rgba(80,40,200,0.5), 0 0 8px rgba(160,100,255,0.3);
  }

  body.dark-mode .quiz-opt {
    background: rgba(18,18,40,0.95);
    border-color: #282860;
    color: var(--text);
  }
  body.dark-mode .quiz-opt:hover:not([disabled]) {
    border-color: #7755dd;
    background: rgba(40,28,88,0.7);
  }
  body.dark-mode .quiz-opt.correct { background: rgba(40,100,60,0.3); border-color: var(--done); color: var(--done); }

  body.dark-mode .review-card:hover {
    border-color: #5544bb;
    box-shadow: 0 0 16px rgba(80,60,200,0.25);
  }

  body.dark-mode #stars-canvas { opacity: 1; }

  /* Dark mode: force deep background everywhere */
  body.dark-mode,
  body.dark-mode .app,
  body.dark-mode .main {

    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--done);
    margin-right: 6px;
    vertical-align: middle;
    box-shadow: 0 0 4px var(--done);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--sb-bg);
    color: var(--white);
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    .topbar-brand-sub { display: none; }
    .topbar-brand-bar h1 { font-size: 13px; }
    .topbar-stats { display: none; }
    .nav-btn { padding: 0 12px; font-size: 11px; }
    .main { padding: 24px 20px; }
  }

  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-dim);
    font-size: 0.8571em;
    font-weight: 300;
    letter-spacing: 0.06em;
  }

  .empty-state .icon {
    font-family: 'Noto Serif TC', serif;
    font-size: 2.0em;
    margin-bottom: 14px;
    opacity: 0.2;
    display: block;
  }
</style>
</head>

// ── State & Storage ───────────────────────────────────────────────────

const LS_KEY = 'iching30_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}

function saveState(s) {
  localStorage.setItem(LS_KEY, JSON.stringify(s));
}

let state = loadState();
// state.tasks[day] = { done: bool, doneAt: iso, note: str }
// state.diaries[day] = { learned, gua, stuck, life, tomorrow, savedAt }
// state.startDate: ISO date string

if (!state.tasks) state.tasks = {};
if (!state.diaries) state.diaries = {};
if (!state.currentDay) { state.currentDay = 1; saveState(state); }

let currentFilter = 'all';
let currentDiaryDay = state.currentDay || 1;

// ── Helpers ───────────────────────────────────────────────────────────

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T00:00:00');
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
}

function getTodayDay() {
  return state.currentDay || 1;
}

function setCurrentDay(d) {
  state.currentDay = Math.max(1, Math.min(30, d));
  saveState(state);
  renderToday();
  renderStats();
}

function getDoneCount() {
  return Object.values(state.tasks).filter(t => t.done).length;
}

function getStreak() {
  // 計算已勾選完成的天數總數
  return Object.values(state.tasks).filter(t => t.done).length;
}

function getTodayQuote() {
  const d = new Date();
  return QUOTES[d.getDate() % QUOTES.length];
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Render Stats ──────────────────────────────────────────────────────

function renderStats() {
  const done = getDoneCount();
  const pct = Math.round(done / 30 * 100);
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-bar').style.width = pct + '%';
  document.getElementById('stat-done').textContent = `${done} / 30`;
  document.getElementById('stat-streak').textContent = getStreak() + ' 天';
}

const CONTENT = [{"day":1,"title":"什麼是易","stage":"第一階段：看懂變化","hexagram":"","symbol":"","keyword":"變化","coreConcept":"易經的「易」，不是神祕預言，而是觀察變化的智慧。世界一直在變，人的心情、身體、關係、工作、家庭，也都在變。學易經的第一步，就是承認變化存在，並學會不被變化嚇倒。","lifeExample":"早上出門天氣很好，下午卻下雨；原本計畫順利的事情，突然出現變數。這不是世界在故意為難你，而是變化本來就是生活的一部分。","interaction":{"type":"choice","title":"觀察今日變化","instruction":"今天你感受到哪種變化？","options":["心情起伏","計畫改變","人際關係","身體狀態"]},"reflection":"你最近生活中最大的變化是什麼？你是抗拒它，還是正在適應它？","dailyPractice":"今天觀察一件正在改變的事情，不急著評價，只先看見它。","quote":"易，不是告訴你未來固定如何，而是提醒你：一切都在流動。"},{"day":2,"title":"陰陽不是好壞","stage":"第一階段：看懂變化","hexagram":"","symbol":"","keyword":"陰陽","coreConcept":"陰陽不是善惡，也不是高低。陽代表主動、明亮、外放、推進；陰代表承接、安靜、內斂、滋養。真正的智慧不是永遠站在陽，也不是永遠躲在陰，而是知道什麼時候該動，什麼時候該收。","lifeExample":"工作時需要陽的力量，清楚、果斷、往前推進；回家休息時需要陰的力量，安靜、修復、照顧自己。","interaction":{"type":"choice","title":"陰陽分類","instruction":"以下哪些屬於陰的力量？","options":["傾聽","安靜休息","衝刺推進","果斷決策"]},"reflection":"你最近比較需要陽的推進，還是陰的修復？","dailyPractice":"今天做一件主動推進的事，也安排一段安靜恢復的時間。","quote":"陰陽不是對立的敵人，而是一呼一吸的節奏。"},{"day":3,"title":"陰中有陽","stage":"第一階段：看懂變化","hexagram":"","symbol":"","keyword":"轉化","coreConcept":"太極圖中，黑裡有白點，白裡有黑點。這代表沒有完全的陰，也沒有完全的陽。困難中可能藏著機會，順利中也可能藏著風險。學易經，就是練習在一件事情裡看見相反力量的種子。","lifeExample":"被批評很難受，但可能讓你發現盲點；事情太順利很開心，但也可能讓人忽略準備。","interaction":{"type":"choice","title":"看見相反力量","instruction":"困難中可能藏著什麼？","options":["發現盲點","學到教訓","找到新路","認識自己"]},"reflection":"最近有沒有一件看似壞事，後來帶給你一點好處？","dailyPractice":"今天遇到不順時，問自己：這裡面有沒有一顆小小的陽？","quote":"真正的變化，常常從相反的地方開始。"},{"day":4,"title":"四象的節奏","stage":"第一階段：看懂變化","hexagram":"","symbol":"","keyword":"四象","coreConcept":"陰陽再細分，就形成四象：少陽、太陽、少陰、太陰。它們像一天的早晨、中午、傍晚、深夜，也像事情的萌芽、旺盛、收斂、沉潛。四象讓我們看懂變化不是突然發生，而是有節奏地推進。","lifeExample":"一個計畫剛開始是少陽，最忙碌時是太陽，逐漸收尾是少陰，完全休息與沉澱是太陰。","interaction":{"type":"choice","title":"你現在在哪個階段？","instruction":"某個計畫或目標，目前處於哪個四象？","options":["萌芽（少陽）","旺盛（太陽）","收尾（少陰）","沉潛（太陰）"]},"reflection":"你現在的某個計畫，處於萌芽、旺盛、收尾，還是沉澱階段？","dailyPractice":"今天不要急著催熟一件事，先判斷它正在什麼階段。","quote":"懂得節奏的人，不會在冬天強迫種子開花。"},{"day":5,"title":"三條線成一卦","stage":"第一階段：看懂變化","hexagram":"","symbol":"","keyword":"八卦生成","coreConcept":"八卦由三條爻組成，每一條爻不是陰就是陽。三條線的排列，形成八種基本能量：乾、坤、震、巽、坎、離、艮、兌。這就像易經的基本字母，未來六十四卦都是由這些字母組合而成。","lifeExample":"就像音樂由幾個音符組成，語言由字母組成，易經的世界則由陰爻與陽爻組成。","interaction":{"type":"lineBuilder","title":"自己排出一個卦","instruction":"點擊每條爻，切換陰（--）或陽（—），看看你排出哪個卦。","options":[]},"reflection":"你覺得用簡單符號描述複雜世界，有什麼有趣的地方？","dailyPractice":"今天用三個關鍵字描述你的狀態。","quote":"三條線，看似簡單，卻開始說出天地的故事。"},{"day":6,"title":"乾卦：創造力","stage":"第二階段：認識八卦","hexagram":"乾","symbol":"☰","keyword":"天、創造、主動","coreConcept":"乾卦三條都是陽爻，象徵天、創造、主動與持續前進。乾不是蠻衝，而是有方向、有精神、有責任感地推進。它提醒我們，當時機成熟時，要敢於開始，也要有持續完成的力量。","lifeExample":"你決定開始做一個新的學習計畫、網站、作品或筆記，這就是乾的力量。","interaction":{"type":"choice","title":"乾卦的精神","instruction":"以下哪些是乾卦的體現？","options":["開始新計畫","每天一點進展","主動承擔責任","等待別人指示"]},"reflection":"你最近最想啟動的一件事是什麼？","dailyPractice":"今天為一個想法做出第一個小動作。","quote":"乾卦不是叫你完美，而是叫你開始。"},{"day":7,"title":"坤卦：承載力","stage":"第二階段：認識八卦","hexagram":"坤","symbol":"☷","keyword":"地、承載、滋養","coreConcept":"坤卦三條都是陰爻，象徵大地、包容、承載與滋養。坤不是軟弱，而是一種很深的力量：能接住、能孕育、能讓事情慢慢成形。乾像發動引擎，坤像讓一切有地方安放。","lifeExample":"家庭照顧、教學陪伴、整理資料、建立系統，都是坤的力量。","interaction":{"type":"choice","title":"什麼是坤的力量","instruction":"選出屬於坤卦精神的行為。","options":["安靜支持","耐心等待","穩定整理","衝動決定"]},"reflection":"你生命中誰曾經像大地一樣承載你？","dailyPractice":"今天做一件整理、承接或照顧的事。","quote":"大地不說話，卻讓萬物都有地方生長。"},{"day":8,"title":"震卦：第一聲雷","stage":"第二階段：認識八卦","hexagram":"震","symbol":"☳","keyword":"雷、啟動、驚醒","coreConcept":"震卦象徵雷，是事情啟動、驚醒與突破的力量。震常常來得突然，像一通電話、一個消息、一個意外，讓原本停滯的局面開始動起來。","lifeExample":"你突然被提醒一件重要事情，或被一個事件推著不得不開始行動，這就是震。","interaction":{"type":"choice","title":"震的時刻","instruction":"哪種情況最像震卦？","options":["突然接到重要通知","被催促完成拖延的事","意外發現問題所在","緊急狀況迫使行動"]},"reflection":"最近有什麼事情突然把你喚醒？","dailyPractice":"今天面對一件被拖延的小事，先動一下就好。","quote":"雷聲不一定舒服，但它讓沉睡的事情醒來。"},{"day":9,"title":"巽卦：風的滲透","stage":"第二階段：認識八卦","hexagram":"巽","symbol":"☴","keyword":"風、進入、柔順","coreConcept":"巽卦象徵風。風不是用力撞開門，而是慢慢滲入每個縫隙。巽提醒我們，有些事情不能硬推，而要用溫和、持續、細緻的方式慢慢影響。","lifeExample":"教學、溝通、建立習慣，都很像風。不是一次大聲說服，而是每天一點點進入對方心裡。","interaction":{"type":"choice","title":"巽的智慧","instruction":"哪種做法最符合巽卦精神？","options":["每天一點點練習","溫和但持續溝通","強力推行改變","柔和地影響環境"]},"reflection":"有沒有一件事，適合慢慢影響，而不是直接強推？","dailyPractice":"今天用柔和但堅定的方式表達一件事。","quote":"風的力量，不在猛烈，而在無孔不入。"},{"day":10,"title":"坎卦：水與危險","stage":"第二階段：認識八卦","hexagram":"坎","symbol":"☵","keyword":"水、險、智慧","coreConcept":"坎卦象徵水，也象徵危險與陷阱。水能流動，也能陷人。坎提醒我們，遇到困難時不要慌張，先看清楚風險在哪裡，再找到可以流過去的路。","lifeExample":"工作中遇到突發狀況，最重要的不是立刻亂動，而是先穩住、評估風險、找出出口。","interaction":{"type":"choice","title":"坎中的智慧","instruction":"遇到困難時，坎卦建議先做什麼？","options":["穩住不慌張","評估風險所在","找尋出路","保持清醒判斷"]},"reflection":"你現在生活中最大的風險是什麼？你有看清楚它嗎？","dailyPractice":"今天遇到困難時，先寫下三個可能風險，再行動。","quote":"坎不是叫你害怕，而是叫你清醒。"},{"day":11,"title":"離卦：看見光","stage":"第二階段：認識八卦","hexagram":"離","symbol":"☲","keyword":"火、光明、依附","coreConcept":"離卦象徵火與光。火能照亮，也需要依附燃料才能持續。離提醒我們，清楚看見很重要，但光明也需要穩定的支持。熱情如果沒有依附在好的結構上，很容易燒完。","lifeExample":"你突然有靈感想做網站、寫文章、畫圖卡，這是離的光；但要靠筆記、時間安排與系統，靈感才會留下來。","interaction":{"type":"choice","title":"離卦的應用","instruction":"靈感（離）需要依附什麼才能持續？","options":["穩定的系統","規律的習慣","紀錄的工具","時間的安排"]},"reflection":"你最近看清楚了什麼事情？","dailyPractice":"今天把一個模糊想法寫成清楚的三句話。","quote":"火讓我們看見，但也提醒我們要珍惜燃料。"},{"day":12,"title":"艮卦：知道停止","stage":"第二階段：認識八卦","hexagram":"艮","symbol":"☶","keyword":"山、停止、界線","coreConcept":"艮卦象徵山，是停止、界線與安定。很多人以為停止代表退步，但易經提醒我們，該停的時候停下來，是很高級的智慧。沒有停止，就沒有整理；沒有界線，就容易耗盡。","lifeExample":"當你已經太累、太焦慮、太混亂時，硬撐不一定是努力，停下來整理才是艮的智慧。","interaction":{"type":"choice","title":"艮的時機","instruction":"哪些情況適合艮卦的停止？","options":["過度消耗時","需要整理時","設立界線時","防止衝動決策"]},"reflection":"你現在最需要在哪裡設立界線？","dailyPractice":"今天選一件不需要立刻做的事，允許自己先停下來。","quote":"停下來，不是放棄，而是讓自己準備好繼續。"},{"day":13,"title":"兌卦：喜悅與說話","stage":"第二階段：認識八卦","hexagram":"兌","symbol":"☱","keyword":"澤、喜悅、表達","coreConcept":"兌卦象徵澤，代表喜悅、表達與人際連結。兌提醒我們，適當的表達與分享，能讓能量流動。但喜悅也要有根，不能只追求表面的愉快而忽視內在的誠實。","lifeExample":"分享學習成果、給予真誠回饋、讓對話充滿喜悅，都是兌的力量。","interaction":{"type":"choice","title":"兌的表達","instruction":"以下哪種表達最符合兌卦精神？","options":["真誠分享心得","給予建設性回饋","讓對話有喜悅感","說讓人舒服的話"]},"reflection":"你最近有沒有真誠地表達過一件重要的事？","dailyPractice":"今天和一個人分享你最近學到的一件事。","quote":"真正的喜悅，來自真誠的表達。"},{"day":14,"title":"整理前兩週","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"整理、複習","coreConcept":"學習需要沉澱。前兩週你認識了陰陽、四象、八卦。現在是時候停下來整理，把分散的概念連結起來，找出你真正理解的和還不清楚的地方。","lifeExample":"就像整理房間，先把東西都拿出來，再判斷哪些留、哪些丟、哪些重新歸位。","interaction":{"type":"choice","title":"前兩週回顧","instruction":"以下哪個概念你最有感受？","options":["陰陽的節奏","八卦的特質","四象的階段","變化的觀察"]},"reflection":"前兩週學下來，哪個卦象最讓你有共鳴？","dailyPractice":"今天花10分鐘整理前兩週的筆記，用自己的話寫下三個收穫。","quote":"整理，是為了讓理解更深。"},{"day":15,"title":"六爻的位置","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"爻位、時位","coreConcept":"六十四卦每個卦有六條爻，位置各有意義。初爻代表起始，二爻是基礎，三爻是關鍵轉折，四爻是接近目標，五爻是最佳位置，上爻是頂點或過度。理解位置，才能理解爻辭的意思。","lifeExample":"一個計畫的六個階段：萌芽、建立基礎、遇到挑戰、接近完成、達到高峰、過度延伸。","interaction":{"type":"choice","title":"爻位對應","instruction":"五爻通常代表什麼狀態？","options":["最佳時機","接近目標","過度延伸","初步開始"]},"reflection":"你現在某件事情，處於六爻的哪個位置？","dailyPractice":"今天為一件進行中的事，定位它在哪個爻位。","quote":"知道自己在哪裡，才能知道下一步怎麼走。"},{"day":16,"title":"變爻的意義","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"變爻、老陰老陽","coreConcept":"卦中會動的爻叫做「變爻」。老陽（九）會變成陰，老陰（六）會變成陽。變爻代表現在正在發生改變的關鍵點，解卦時要特別注意變爻的爻辭，它往往是最重要的提示。","lifeExample":"在一個困難局面中，某一個環節正在鬆動，那個環節就是你要關注的變爻。","interaction":{"type":"choice","title":"變爻的作用","instruction":"解卦時，變爻主要提示什麼？","options":["正在改變的關鍵","目前最脆弱的地方","需要特別注意之處","即將轉化的力量"]},"reflection":"你現在某個問題中，哪個環節正在改變？","dailyPractice":"今天找出生活中一個正在改變的關鍵點。","quote":"變爻不是壞事，它是轉化的訊號。"},{"day":17,"title":"本卦與之卦","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"本卦、之卦","coreConcept":"本卦是你現在的狀態，之卦是變爻改變後形成的新卦，代表可能的走向。解卦時，先讀本卦看現況，再看之卦了解可能趨勢。之卦不是命運，而是如果這樣繼續下去的方向。","lifeExample":"如果你現在的狀態是屯卦（混亂起步），變化後可能走向蒙卦（需要引導與學習）。","interaction":{"type":"choice","title":"本卦與之卦","instruction":"之卦代表什麼？","options":["可能的走向","目前的狀態","最壞的結果","最好的結果"]},"reflection":"你現在某件事的「本卦」是什麼樣的狀態？","dailyPractice":"今天用一句話描述你目前的本卦狀態，再想想可能的走向。","quote":"先看清楚現在，再想像之後。"},{"day":18,"title":"時、位、勢","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"時位勢","coreConcept":"易經強調三個分析維度：時（現在是什麼時機）、位（你在什麼位置）、勢（整體趨勢往哪裡走）。同一個問題，在不同時、位、勢下，答案可能完全不同。","lifeExample":"換工作這件事：如果時機不對、你的位置尚未穩固、勢頭往下，可能不是好時候。反之，三者配合則可以行動。","interaction":{"type":"choice","title":"時位勢分析","instruction":"面對一個決策，哪三個維度最重要？","options":["現在的時機","自己的位置","整體的趨勢","別人的看法"]},"reflection":"你現在某個決策，時、位、勢各是什麼狀態？","dailyPractice":"今天用時、位、勢三個角度分析一個正在考慮的決定。","quote":"同樣的行動，在對的時位勢才會開花。"},{"day":19,"title":"如何問一個好問題","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"問卦品質","coreConcept":"易經不是答案機，它是幫你整理問題的工具。好的問題要具體、誠實、聚焦在你能影響的範圍。「我會不會成功」是差的問題；「我現在推動這件事的障礙是什麼」是好問題。","lifeExample":"與其問「他愛不愛我」，不如問「這段關係目前最需要什麼樣的行動」。","interaction":{"type":"choice","title":"好問題練習","instruction":"哪個問題最適合拿來占卜？","options":["我現在的狀態適合推進嗎","我會不會成功","對方想什麼","這件事最大的風險是什麼"]},"reflection":"你最想問的問題，能不能改得更具體？","dailyPractice":"今天把一個焦慮的問題，改寫成可觀察、可行動的版本。","quote":"問對問題，比得到答案更重要。"},{"day":20,"title":"卦辭與爻辭","stage":"第三階段：深入理解","hexagram":"","symbol":"","keyword":"讀卦方法","coreConcept":"卦辭是整個卦的整體描述；爻辭是每一條爻在特定位置的說明。讀卦時先看卦辭理解整體氛圍，再看變爻的爻辭找出關鍵提示。不要每條爻都讀，容易迷失。","lifeExample":"就像讀地圖：卦辭告訴你地形特色，爻辭告訴你你站的那個點要注意什麼。","interaction":{"type":"choice","title":"讀卦順序","instruction":"讀卦的正確順序是？","options":["先卦辭後變爻爻辭","全部爻辭都讀","只讀爻辭","隨機挑一條"]},"reflection":"你讀過的卦辭裡，哪一句最讓你有感？","dailyPractice":"今天找一個卦，只讀卦辭與一條爻辭，寫下白話理解。","quote":"讀卦不是記憶，而是對話。"},{"day":21,"title":"乾卦深讀","stage":"第三階段：深入理解","hexagram":"乾","symbol":"☰","keyword":"天行健","coreConcept":"乾卦六條都是陽爻，代表不斷前進的創造力。但六爻中，初九到九五是上升過程，上九是過度——飛得太高、太驕傲，就會後悔。乾卦提醒我們，持續前進的同時，也要保持謙遜。","lifeExample":"事業或學習進展順利時，最容易輕忽細節、過度自信。這時候乾的上九就在提醒你。","interaction":{"type":"choice","title":"乾卦的警示","instruction":"乾卦上九「亢龍有悔」提醒我們什麼？","options":["太高容易跌落","謙遜比驕傲重要","成功後要更謹慎","不要過度延伸"]},"reflection":"你最近有沒有在某件事上過度延伸、忘了謹慎？","dailyPractice":"今天在一件進展順利的事上，刻意找一個需要謹慎的地方。","quote":"天行健，君子以自強不息。但強，也要知道界線在哪裡。"},{"day":22,"title":"屯卦：萬事起頭難","stage":"第四階段：代表性卦象","hexagram":"水雷屯","symbol":"䷂","keyword":"初生、混亂、開始","coreConcept":"屯卦象徵萬物剛開始生長時的困難。就像小草剛冒出土，外面有風雨，下面有阻力。屯不是壞卦，而是提醒我們：剛開始本來就會混亂，不要因為卡住就以為自己失敗。","lifeExample":"剛開始做互動網站、學英文、準備考試或整理教材時，最常見的感覺就是亂。這正是屯卦的狀態。","interaction":{"type":"choice","title":"屯卦的啟示","instruction":"面對屯卦的混亂起步，最好的態度是？","options":["接受混亂是正常的","只完成最小的一步","不要求完整","先動起來再說"]},"reflection":"你現在有哪件事正在「起頭難」？","dailyPractice":"今天只完成最小的一步，不要求完整。","quote":"屯卦告訴你：混亂不是失敗，而是出生的聲音。"},{"day":23,"title":"蒙卦：學習與啟蒙","stage":"第四階段：代表性卦象","hexagram":"山水蒙","symbol":"䷃","keyword":"童蒙、學習、求教","coreConcept":"蒙卦象徵初學者的懵懂。它不是貶低不懂的人，而是提醒學習需要謙卑、方法與好的引導。真正的啟蒙，不是把答案塞給對方，而是讓對方慢慢長出理解力。","lifeExample":"帶領初學者時，重要的是設計好問題與步驟，而不是只責備對方不會。","interaction":{"type":"choice","title":"啟蒙的方式","instruction":"最符合蒙卦精神的教學方式是？","options":["引導對方自己發現","提供好的問題框架","從現象開始觀察","一步步帶領理解"]},"reflection":"你現在正在學什麼？你需要什麼樣的引導？","dailyPractice":"今天把一個你會的知識，拆成初學者也懂的三步驟。","quote":"蒙卦的溫柔，是承認不懂也是學習的一部分。"},{"day":24,"title":"需卦：等待不是空白","stage":"第四階段：代表性卦象","hexagram":"水天需","symbol":"䷄","keyword":"等待、準備、時機","coreConcept":"需卦講的是等待。等待不是什麼都不做，而是在時機未到前，保存力量、準備資源、穩住心。很多失敗不是因為不努力，而是太早出手。","lifeExample":"投稿、考試、作品成熟、孩子成長，都需要等待。等待時可以準備，但不能強迫花立刻開。","interaction":{"type":"choice","title":"需卦的等待","instruction":"等待時最好的行動是？","options":["保存力量","準備資源","穩住心態","觀察時機變化"]},"reflection":"你現在有哪件事需要等待，但你很著急？","dailyPractice":"今天把等待中的焦慮，轉成一個可準備的小動作。","quote":"真正的等待，是帶著準備的安靜。"},{"day":25,"title":"泰卦：天地相交","stage":"第四階段：代表性卦象","hexagram":"地天泰","symbol":"䷊","keyword":"通泰、順暢、上下交流","coreConcept":"泰卦是天地相交、上下流通的狀態。它象徵順利、溝通與系統運轉良好。泰不是永遠沒有問題，而是內外能量能夠交流，所以卡住的地方比較少。","lifeExample":"一個團隊如果上面願意聽、下面敢回饋，中間流程清楚，這就是泰的精神。","interaction":{"type":"choice","title":"泰的條件","instruction":"哪些條件讓系統進入泰的狀態？","options":["上下願意溝通","流程清楚透明","回饋能被接收","內外能量交流"]},"reflection":"你的生活或工作中，哪個地方開始變得比較通暢？","dailyPractice":"今天主動打通一個小流程，例如整理資料、回覆訊息或釐清分工。","quote":"泰卦的順，不是沒有阻力，而是氣能流過去。"},{"day":26,"title":"否卦：堵住的時候","stage":"第五階段：學會應用","hexagram":"天地否","symbol":"䷋","keyword":"閉塞、不通、保守","coreConcept":"否卦與泰卦相反，象徵天地不交、上下不通。否的狀態常讓人感到卡住、溝通失效、努力沒有回應。這時候不一定適合硬衝，而是先保護核心、減少消耗，等待重新流通的機會。","lifeExample":"你很努力提出建議，但環境暫時不接納。這時候可以先把內容整理好、保護自己的能量，而不是一直撞牆。","interaction":{"type":"choice","title":"否卦的對策","instruction":"處於否卦狀態，最好的策略是？","options":["先保存能量","觀察時機","尋找旁路","不在不通之處耗盡"]},"reflection":"你現在有哪件事處於不通的狀態？","dailyPractice":"今天對一件暫時無法推動的事，寫下可保存的資源。","quote":"否卦不是絕望，而是提醒你不要把自己耗盡在不通之處。"},{"day":27,"title":"占卜不是迷信答案機","stage":"第五階段：學會應用","hexagram":"","symbol":"","keyword":"占卜觀","coreConcept":"易經占卜不應該被理解成命令式預言，而比較像一面鏡子。它幫助我們整理問題、看見狀態、辨認趨勢與提醒盲點。真正重要的不是「它說會不會成功」，而是「它提醒我現在應該看見什麼」。","lifeExample":"當你問要不要換工作，占卜不是替你做決定，而是幫你看見你目前的心態、外在條件、風險與時機。","interaction":{"type":"choice","title":"占卜的正確理解","instruction":"易經占卜最重要的功能是？","options":["整理問題","看見自己的狀態","辨認趨勢","提醒盲點"]},"reflection":"你最常想問命運什麼問題？這個問題能不能改得更具體？","dailyPractice":"今天把一個焦慮問題改寫成可觀察、可行動的問題。","quote":"易經不是替你活，而是陪你把問題看清楚。"},{"day":28,"title":"三枚銅錢起卦","stage":"第五階段：學會應用","hexagram":"","symbol":"","keyword":"起卦","coreConcept":"常見起卦方式之一，是使用三枚銅錢。每次擲出得到一爻，連續六次，從下往上畫出六爻。數值可能是少陰、少陽、老陰、老陽，其中老陰與老陽代表變爻。","lifeExample":"你可以把起卦當成一種整理心念的儀式。重點不是神奇，而是你在起卦前要先把問題問清楚。","interaction":{"type":"coinToss","title":"虛擬起卦練習","instruction":"點擊「擲幣」六次，從下往上產生六條爻，完成起卦。","options":[]},"reflection":"如果今天要起一卦，你會問什麼問題？","dailyPractice":"今天練習寫下一個清楚、具體、不逃避責任的問題。","quote":"起卦之前，先把心裡真正的問題請出來。"},{"day":29,"title":"如何讀本卦、變爻、之卦","stage":"第五階段：學會應用","hexagram":"","symbol":"","keyword":"解卦流程","coreConcept":"基礎解卦可以先看三層：本卦代表目前狀態，變爻代表正在變動的關鍵，之卦代表可能走向。不要一開始就急著找吉凶，而是先問：現在像什麼？哪裡在變？接下來可能往哪裡去？","lifeExample":"你想做新網站，本卦可能顯示起步混亂，變爻提醒某個關鍵阻礙，之卦指出如果修正後，可能走向更順暢的狀態。","interaction":{"type":"choice","title":"解卦三步驟","instruction":"解卦的正確順序是？","options":["本卦看現況","變爻找關鍵","之卦看走向","先不論吉凶"]},"reflection":"當你面對問題時，會不會太快跳到吉凶，而忘了先看狀態？","dailyPractice":"今天用「現在、關鍵、趨勢」三欄分析一件事。","quote":"先看清楚，再談吉凶。"},{"day":30,"title":"完成你的第一卦","stage":"第五階段：學會應用","hexagram":"","symbol":"","keyword":"整合實作","coreConcept":"第30天，我們把前面學到的觀念整合起來：陰陽、四象、八卦、六十四卦、爻位、變爻、本卦與之卦。學易經不是為了逃避人生選擇，而是為了在不確定中更清醒地做選擇。","lifeExample":"當你問一個真實問題，例如是否開始某個作品、是否換方向、是否等待時，你可以用易經幫自己整理：目前狀態是什麼？真正變動的是什麼？我可以怎麼順勢而為？","interaction":{"type":"choice","title":"30天的收穫","instruction":"完成30天後，你最大的收穫是什麼？","options":["學會觀察變化","理解陰陽節奏","認識八卦特質","更清醒地做選擇"]},"reflection":"學完30天 const RICH = [{"day":1,"title":"認識《易經》是什麼？","theme":"分清「經」與「卦」","goals":["知道易經不是算命書。","知道「經」是什麼。","知道「卦」是什麼。"],"sections":[{"h":"一、《易經》到底是什麼？","p":["很多人以為：易經 = 算命。其實不是。","易經最早可以理解為一套觀察世界變化的方法。古人發現，春夏秋冬會變，月亮圓缺會變，國家興衰會變，人生際遇也會變。","於是古人開始研究一個很重要的問題：變化有沒有規律？","這就是《易經》的起點。它不是要把未來固定下來，而是幫助人在變化中看懂處境、判斷時機、調整行動。"]},{"h":"二、什麼是「經」？","p":["「經」原本有經線、主線的意思。織布時，經線是縱向的骨架，有了經線，緯線才能交織成布。","後來，「經」也被用來稱呼那些值得長久閱讀、反覆思考的智慧文本。像《詩經》、《道德經》、《易經》，都不是只看一次就結束的書。","所以，《易經》可以理解為：討論變化規律的經典。它用很古老、很簡潔的方式，保存古人對天地、人事與時機的觀察。"]},{"h":"三、什麼是「卦」？","p":["「卦」是一種符號。古人不只用文字說明世界，也用線條來表示世界的狀態。","最基本的線條有兩種：陽爻與陰爻。","陽爻是一條完整的線，寫作：━━━。它可以代表積極、外放、剛強、推進。","陰爻是中間斷開的線，寫作：━ ━。它可以代表柔和、接受、內斂、承接。","這些線條組合起來，就形成卦象。卦象像一張情境圖，用很少的符號描述複雜的處境。"]},{"h":"生活案例","p":["想像您今天上刀。病人一開始很穩定，血壓 120/70，HR 75。這是一種狀態。","結果手術中突然出血，BP 掉到 80/40，HR 上升到 130。這時狀態改變了。","麻醉工作中，我們一直在觀察變化：血壓變化、心跳變化、氧合變化、麻醉深度變化。易經研究的，其實也是這種變化。","只是易經把這種觀察放到更大的生活裡：一段關係的變化、一個計畫的變化、一個人的心境變化、一個時代的變化。"]},{"h":"今日原文","p":["《繫辭傳》：「生生之謂易。」"]},{"h":"白話翻譯","p":["萬事萬物不斷產生、不斷流動、不斷變化，這就是易。"]}],"it":{"type":"multipleChoice","title":"以下哪些是變化？","q":"請選出屬於「變化」的例子。","opts":[{"t":"白天變黑夜","ok":true},{"t":"幼兒變成人","ok":true},{"t":"春天變夏天","ok":true},{"t":"血壓變低","ok":true}],"ans":"全部都是。","exp":"易經關心的不是只有神祕事件，而是所有狀態的變化。"},"reflection":"最近一年，您最大的變化是什麼？","homework":"寫下：我希望透過學習易經理解什麼？","quote":"易經不是預測未來，而是幫助你理解變化。"},{"day":2,"title":"理解陰陽的基本概念","theme":"陰陽不是好壞，而是兩種力量","goals":["知道陽代表主動、外放、剛強；陰代表柔和、接受、內斂，並理解陰陽會互相轉化。"],"sections":[{"h":"一、陰陽不是好壞","p":["很多人一開始聽到陰陽，會直覺以為陽比較好、陰比較不好。這其實不是易經的意思。陰陽不是道德判斷，而是用來描述世界狀態的兩種力量。","陽比較像向外、明亮、主動、推進；陰比較像向內、安靜、承接、滋養。人需要陽，也需要陰。只有陽，會耗竭；只有陰，會停滯。"]},{"h":"二、陽是什麼？","p":["陽可以理解為一種往外發展的力量。像太陽、白天、行動、說話、開始、推進，這些都偏陽。","在生活中，當您決定開始做一個網站、整理一份教材、主動解決問題時，就是陽的力量在運作。"]},{"h":"三、陰是什麼？","p":["陰可以理解為一種往內收斂、承接、保存的力量。像月亮、夜晚、休息、傾聽、等待、整理，這些都偏陰。","陰不是軟弱。能夠承接、照顧、恢復、沉澱，其實是一種很深的力量。"]},{"h":"生活案例","p":["麻醉誘導後，病人進入沉睡、安靜、接受照護的狀態，可以借用陰的語言來理解。手術刺激出現，血壓與心跳上升，身體反應變得外放而激烈，可以借用陽的語言來理解。","臨床上重要的不是永遠壓低或永遠刺激，而是維持合適平衡。這也很像陰陽。"]},{"h":"今日原文","p":["《繫辭傳》：「一陰一陽之謂道。」"]},{"h":"白話翻譯","p":["陰與陽互相交替、互相作用，這就是天地運行的道路。"]}],"it":{"type":"dragSort","title":"陰陽分類遊戲","q":"請把下列詞語分成偏陽、偏陰，或兩者皆有。","opts":["太陽","月亮","跑步","睡眠","說話","傾聽","開始計畫","整理資料"],"ans":"陽偏主動外放，陰偏安靜承接。","exp":""},"reflection":"最近的您比較需要陽的行動，還是陰的修復？","homework":"列出生活中3個偏陽的狀態、3個偏陰的狀態。","quote":"陽推動世界，陰滋養世界。"},{"day":3,"title":"認識八卦","theme":"乾、坤、震、巽、坎、離、艮、兌","goals":["認識八卦名稱、符號、自然象徵與基本性格。"],"sections":[{"h":"一、八卦像八種自然力量","p":["八卦是易經的基礎符號。每一卦由三條爻組成，代表一種自然力量，也代表一種人生處境。","八卦分別是：乾、坤、震、巽、坎、離、艮、兌。初學時先不要急著背所有延伸意義，只要先記住它們像八種天氣、八種力量。"]},{"h":"二、前四卦：乾、坤、震、巽","p":["乾為天，象徵創造、主動、剛健。像一個人開始推動新計畫。","坤為地，象徵承載、包容、滋養。像大地安靜地讓萬物生長。","震為雷，象徵啟動、驚醒、突然開始。像警報響起，整個局面被喚醒。","巽為風，象徵滲透、溝通、慢慢進入。像教育與影響，不是硬推，而是每天一點點改變。"]},{"h":"三、後四卦：坎、離、艮、兌","p":["坎為水，象徵危險、陷阱、流動與智慧。遇到坎，不是只害怕，而是要看清風險，找到流動的路。","離為火，象徵光明、看見、依附。靈感、理解、照亮問題，都有離的味道。","艮為山，象徵停止、界線、安定。知道何時停，是非常重要的智慧。","兌為澤，象徵喜悅、交流、說話。好的溝通能滋潤關係，也能讓知識流動。"]},{"h":"生活案例","p":["您整理麻醉教材時，啟動專案是乾；默默整理資料是坤；突然發現一個重要錯誤是震；慢慢帶學妹理解是巽；遇到臨床危機是坎；突然想通一個教學比喻是離；決定先停止修改是艮；與共學團分享後產生交流是兌。"]},{"h":"今日原文","p":["八卦常以自然象徵記憶：乾天、坤地、震雷、巽風、坎水、離火、艮山、兌澤。"]},{"h":"白話翻譯","p":["八卦不是抽象符號而已，它們是古人用自然現象理解人生處境的方式。"]}],"it":{"type":"eightCards","title":"八卦翻牌","q":"點擊八卦卡片，查看自然象徵與生活關鍵字。","opts":["乾：天、創造","坤：地、承載","震：雷、啟動","巽：風、滲透","坎：水、危險","離：火、光明","艮：山、停止","兌：澤、喜悅"],"ans":"","exp":""},"reflection":"今天的您最像八卦中的哪一卦？為什麼？","homework":"做一張八卦速查表：卦名、符號、自然象徵、三個關鍵字。","quote":"八卦像八種天氣，也像八種人生處境。"},{"day":4,"title":"了解卦象結構","theme":"三爻如何組成一卦","goals":["理解陰爻、陽爻與三條爻如何組成八卦。"],"sections":[{"h":"一、卦象由爻組成","p":["卦象最基本的單位叫做「爻」。爻有兩種：陽爻與陰爻。陽爻是一條完整的線，陰爻是中間斷開的線。","三條爻疊在一起，就形成一個八卦。這三條線不是隨便看的，而是由下往上生成。"]},{"h":"二、為什麼由下往上？","p":["由下往上，很像一件事情從根基開始長出來。最下面是開始、基礎、內在；中間是發展；上面是外在表現或結果。","因此看卦時，不要只看圖案漂亮不漂亮，而要注意線條的位置。"]},{"h":"三、三爻變成八卦","p":["三條線每一條都可能是陰或陽，所以會有八種組合。這就是八卦。","例如三條都是陽，是乾卦；三條都是陰，是坤卦；上下是陰、中間是陽，是坎卦；上下是陽、中間是陰，是離卦。"]},{"h":"生活案例","p":["一個計畫也有三層：最下面是動機與資源，中間是執行過程，最上面是成果與外在評價。若根基不穩，外表再漂亮也容易倒。"]},{"h":"今日原文","p":["初學可先記：「爻成卦，卦成象。」"]},{"h":"白話翻譯","p":["一條一條爻組成卦，卦再形成可觀察的象。"]}],"it":{"type":"trigramBuilder","title":"三爻造卦器","q":"點擊三條線切換陰爻或陽爻，看看會形成哪一個八卦。","opts":["下爻","中爻","上爻"],"ans":"","exp":""},"reflection":"如果用三條線表示今天的狀態，您會怎麼畫？","homework":"畫出乾、坤、坎、離四個卦象，並標示每一條爻。","quote":"三條線很簡單，卻能打開一套觀察世界的語言。"},{"day":5,"title":"初步認識六十四卦","theme":"上下卦組成六十四卦","goals":["理解六十四卦是由上下兩個八卦相疊而成。"],"sections":[{"h":"一、六十四卦怎麼來？","p":["八卦是三條爻，六十四卦是六條爻。它的形成方式，是把一個八卦放在下面，另一個八卦放在上面。","八卦有八個，上下相疊，八乘八，就成為六十四卦。"]},{"h":"二、上卦與下卦","p":["下方三爻叫下卦，上方三爻叫上卦。初學可以先把下卦理解為內在、自己、根基，把上卦理解為外在、環境、發展。","這不是唯一解釋，但很適合入門。它能幫助我們分清楚一件事是內在問題，還是外在環境問題。"]},{"h":"三、同樣兩個卦，上下不同意思不同","p":["例如乾與坤相遇，如果坤在上、乾在下，是地天泰。泰有上下交流、氣機通暢的意思。","如果乾在上、坤在下，是天地否。否有上下不交、閉塞不通的意思。可見上下位置很重要。"]},{"h":"生活案例","p":["同樣是您和環境，如果您內在準備好了，外在也願意配合，事情可能很順。若內在很想推進，但外在制度完全卡住，就會有閉塞感。六十四卦就是在看這些組合。"]},{"h":"今日原文","p":["初學可先記：「八卦相重，成六十四卦。」"]},{"h":"白話翻譯","p":["八個基本卦互相上下組合，就形成六十四種處境。"]}],"it":{"type":"hexagramComposer","title":"上下卦組合器","q":"選擇上卦與下卦，看看會組成哪一個六十四卦。","opts":["乾","坤","震","巽","坎","離","艮","兌"],"ans":"","exp":""},"reflection":"您現在的外在環境與內在狀態一致嗎？","homework":"查出乾上坤下、坤上乾下分別是哪兩卦，並寫下差異。","quote":"六十四卦不是六十四個答案，而是六十四種處境。"},{"day":6,"title":"閱讀一卦的卦辭","theme":"第一次把卦辭寫成白話","goals":["選擇一卦，閱讀卦辭，並用自己的語言寫下理解。"],"sections":[{"h":"一、今日核心觀念","p":["卦辭像一個卦的總評。今天建議選乾卦或坤卦，先讀卦辭，再用自己的話說明。"]},{"h":"二、今天要怎麼學？","p":["先不要急著追求完整或完美。易經的學習很像整理一套臨床判斷流程：先知道概念，再練習使用，最後透過回看修正。","今天的任務是把抽象概念落到一個具體動作。只要完成今日練習，就算有進度。"]},{"h":"三、重要提醒","p":["乾卦卦辭：「元亨利貞。」","可以白話理解為：一件事有開始、通達、合宜與守正的可能。","請把今天的內容放回自己的生活裡理解。易經不是只存在於古書中，它最有價值的地方，是幫助我們看懂真實處境。"]},{"h":"生活案例","p":["如果把易經學習比喻成麻醉訓練，一開始不需要立刻處理最複雜的危機。先學會監測、藥物、流程與基本判斷，再慢慢累積案例。","今天的學習也是如此：先掌握一個小觀念，完成一個小練習，讓理解慢慢長出來。"]},{"h":"今日原文或關鍵句","p":["乾卦卦辭：「元亨利貞。」"]},{"h":"白話翻譯","p":["可以白話理解為：一件事有開始、通達、合宜與守正的可能。"]}],"it":{"type":"guidedPractice","title":"Day 6 互動練習","q":"依照今日主題完成一個小練習，並把結果寫入筆記。","opts":["閱讀","標記重點","白話整理","生活對照","儲存筆記"],"ans":"","exp":""},"reflection":"今天的主題「第一次把卦辭寫成白話」讓您想到生活中的哪一件事？","homework":"完成今日筆記，至少寫下三個重點、一個生活例子、一個仍不懂的問題。","quote":"讀卦辭，不是先求答案，而是先看懂處境。"},{"day":7,"title":"閱讀同一卦的兩條爻辭","theme":"從整體進入位置與階段","goals":["理解爻辭是針對不同爻位的提醒。"],"sections":[{"h":"一、今日核心觀念","p":["爻辭是卦中每一條爻的提醒。同一卦在不同位置，行動策略會不同。"]},{"h":"二、今天要怎麼學？","p":["先不要 const GUA_MAP = {
  '111': { name: '乾', symbol: '☰' },
  '000': { name: '坤', symbol: '☷' },
  '100': { name: '震', symbol: '☳' },
  '011': { name: '巽', symbol: '☴' },
  '010': { name: '坎', symbol: '☵' },
  '101': { name: '離', symbol: '☲' },
  '001': { name: '艮', symbol: '☶' },
  '110': { name: '兌', symbol: '☱' },
};

// ── Render Today Content ──────────────────────────────────────────────

function renderTodayContent(day) {
  const c = CONTENT.find(d => d.day === day);
  const course = COURSE.find(d => d.day === day);
  const sec = document.getElementById('today-content-section');
  if (!c) { sec.innerHTML = ''; return; }

  const stateKey = `interact_${day}`;
  const saved = state[stateKey] || {};
  const saved2 = saved;
  const rich = RICH.find(d => d.day === day);
  const lesson = LESSONS.find(d => d.day === day);

  let interactionHTML = '';
  const it = c.interaction;

  if (it.type === 'choice' && it.options) {
    const opts = it.options.map((o, i) => {
      const sel = saved.choice === i ? 'selected' : '';
      return `<button class="choice-opt ${sel}" onclick="selectChoice(${day},${i},this)">${o}</button>`;
    }).join('');
    interactionHTML = `<div class="choice-grid">${opts}</div>`;
  } else if (it.type === 'lineBuilder') {
    const yao = saved.yao || [1, 1, 1];
    const rows = [2, 1, 0].map(i => {
      const isYang = yao[i];
      return `<div class="yao-toggle">
        <button class="yao-btn" onclick="toggleYao(${day},${i},this)" data-yao="${i}">${isYang ? '—' : '- -'}</button>
        <span class="yao-label">第 ${i + 1} 爻</span>
      </div>`;
    }).join('');
    const key = yao.map(v => v ? '1' : '0').join('');
    const gua = GUA_MAP[key];
    const guaText = gua ? `${gua.symbol} ${gua.name}卦` : '組合中…';
    interactionHTML = `<div class="line-builder">${rows}</div><div class="gua-result" id="gua-result-${day}">${guaText}</div>`;
  } else if (it.type === 'coinToss') {
    const yao = saved.coinYao || [];
    const rows = [0,1,2,3,4,5].map(i => {
      const v = yao[i];
      const label = ['初爻','二爻','三爻','四爻','五爻','上爻'][i];
      const sym = v === undefined ? '' : (v === 1 ? '<span class="coin-yao yang">—</span>' : '<span class="coin-yao yin">- -</span>');
      return `<div class="coin-row-item">
        <button class="coin-throw-btn" onclick="throwCoin(${day},${i})" ${v !== undefined ? 'disabled style="opacity:0.4"' : ''}>擲</button>
        <span style="font-size:0.7143em;color:var(--text-dim);min-width:28px">${label}</span>
        ${sym}
      </div>`;
    }).join('');
    const resetBtn = yao.length === 6 ? `<button class="coin-throw-btn" style="margin-top:6px" onclick="resetCoin(${day})">重置</button>` : '';
    interactionHTML = `<div class="coin-rows">${rows}</div>${resetBtn}`;
  }

  const isOpen = saved.open !== false;

  sec.innerHTML = `
    <div class="section-label" style="margin-top:4px">今日概念</div>
    <div class="content-card">
      <div class="content-card-header" onclick="toggleContent(${day})">
        <div class="content-card-header-left">
          ${c.symbol ? `<span class="content-symbol">${c.symbol}</span>` : ''}
          <div>
            <div class="content-day-label">${c.stage}｜關鍵詞：${c.keyword}</div>
            <div class="content-card-title">${c.title}</div>
          </div>
        </div>
        <span class="content-toggle-icon ${isOpen ? 'open' : ''}" id="content-toggle-${day}">▼</span>
      </div>
      <div class="content-body ${isOpen ? 'open' : ''}" id="content-body-${day}">
        <div class="content-block">
          <div class="content-block-label">今日目標</div>
          <div class="goal-block">${course ? course.goal : ''}</div>
        </div>
        ${rich ? `
        <div class="content-block">
          <div class="content-block-label">今日學習目標</div>
          <div class="goals-list">
            ${(rich.goals || []).map(g => `<div class="goal-item">${g}</div>`).join('')}
          </div>
        </div>
        <div class="content-block">
          <div class="content-block-label">課程內容</div>
          <div class="section-accordion" id="acc-${day}">
            ${(rich.sections || []).map((s, i) => {
              const isCase = s.h.includes('案例');
              const isQuote = s.h.includes('原文') || s.h.includes('翻譯');
              const isOpenDefault = i === 0;
              return '<div class="acc-item' + (isCase ? ' is-case' : '') + (isQuote ? ' is-quote' : '') + '">' +
                '<div class="acc-header" onclick="toggleAcc(this)">' +
                  '<span>' + s.h + '</span>' +
                  '<span class="acc-arrow' + (isOpenDefault ? ' open' : '') + '">▼</span>' +
                '</div>' +
                '<div class="acc-body' + (isOpenDefault ? ' open' : '') + '">' +
                  s.p.map(p => '<div class="acc-para">' + p + '</div>').join('') +
                '</div></div>';
            }).join('')}
          </div>
        </div>
        ${lesson ? `
        <div class="content-block">
          <div class="content-block-label">今日核心觀念</div>
          <div class="content-block-text">${lesson.core}</div>
        </div>
        <div class="content-block">
          <div class="section-accordion">
            <div class="acc-item is-quote">
              <div class="acc-header" onclick="toggleAcc(this)"><span>今日經典</span><span class="acc-arrow">▼</span></div>
              <div class="acc-body">
                <div class="acc-para" style="font-family:'Noto Serif TC',serif;font-size:1.0em;letter-spacing:0.06em">${lesson.classic.text}</div>
                <div style="font-size:0.7143em;color:var(--text-dim);margin-top:6px;font-weight:300">── ${lesson.classic.source}</div>
              </div>
            </div>
            <div class="acc-item is-case">
              <div class="acc-header" onclick="toggleAcc(this)"><span>今日故事｜${lesson.story.name}</span><span class="acc-arrow">▼</span></div>
              <div class="acc-body"><div class="acc-para">${lesson.story.description}</div></div>
            </div>
          </div>
        </div>` : ''}` : `
        <div class="content-block">
          <div class="content-block-label">核心概念</div>
          <div class="content-block-text">${c.coreConcept}</div>
        </div>
        <div class="content-block">
          <div class="content-block-label">生活例子</div>
          <div class="content-block-text">${c.lifeExample}</div>
        </div>`}
        ${rich ? renderRichInteraction(day, rich, saved2) : `
        <div class="content-block">
          <div class="content-block-label">${it.title}</div>
          <div class="content-interaction-desc">${it.instruction}</div>
          ${interactionHTML}
        </div>`}
        <div class="content-block">
          <div class="content-block-label">今日功課</div>
          <div class="content-block-text">${rich ? rich.homework : c.dailyPractice}</div>
        </div>
        <div class="content-block">
          <div class="content-block-label">反思問題</div>
          ${lesson && lesson.journalPrompts ? `
          <div class="goals-list">
            ${lesson.journalPrompts.map(p => `<div class="goal-item">${p}</div>`).join('')}
          </div>` : `<div class="content-block-text">${rich ? rich.reflection : c.reflection}</div>`}
        </div>
        <div class="content-quote-block">${rich ? rich.quote : c.quote}</div>
        ${course && course.practice.length ? `
        <div class="content-block" style="margin-top:18px">
          <div class="content-block-label">今日練習</div>
          <ul class="practice-list">
            ${course.practice.map(p => `<li class="practice-item">${p}</li>`).join('')}
          </ul>
        </div>` : ''}
        ${course && course.quiz ? `
        <div class="content-block">
          <div class="content-block-label">今日測驗</div>
          <div class="quiz-block">
            <div class="quiz-question">${course.quiz.q}</div>
            <div class="quiz-opts" id="quiz-opts-${day}">
              ${course.quiz.opts.map((opt, i) => {
                const isAnswered = saved2 && saved2.quizAnswered;
                const isCorrect = opt === course.quiz.ans;
                const isPicked = saved2 && saved2.quizPick === i;
                let cls = '';
                if (isAnswered) cls = isCorrect ? 'correct' : (isPicked ? 'wrong' : '');
                return `<button class="quiz-opt ${cls}" ${isAnswered ? 'disabled' : ''} onclick="answerQuiz(${day},${i},this)">${opt}</button>`;
              }).join('')}
            </div>
            <div class="quiz-explanation ${saved2 && saved2.quizAnswered ? 'show' : ''}" id="quiz-exp-${day}">${course.quiz.exp}</div>
          </div>
        </div>` : ''}
      </div>
    </div>
  `;
}

function renderRichInteraction(day, rich, saved) {
  const it = rich.it;
  if (!it || !it.type) return '';

  const stateKey = `interact_${day}`;
  let html = '';

  if (it.type === 'multipleChoice') {
    const opts = it.opts || [];
    const isAnswered = saved && saved.richAnswered;
    const picked = saved ? saved.richPick : -1;
    const optHTML = opts.map((o, i) => {
      const text = typeof o === 'object' ? o.t : o;
      const correct = typeof o === 'object' ? o.ok : false;
      let cls = '';
      if (isAnswered) cls = correct ? 'correct' : (picked === i ? 'wrong' : '');
      return `<button class="quiz-opt ${cls}" ${isAnswered ? 'disabled' : ''} onclick="answerRich(${day},${i},this)">${text}</button>`;
    }).join('');
    const expClass = isAnswered ? 'show' : '';
    const ansText = it.ans || '';
    const expText = it.exp || '';
    html = `<div class="quiz-block">
      <div class="quiz-question">${it.q}</div>
      <div class="quiz-opts" id="rich-opts-${day}">${optHTML}</div>
      <div class="quiz-explanation ${expClass}" id="rich-exp-${day}">${ansText}${expText ? '　' + expText : ''}</div>
    </div>`;

  } else if (it.type === 'dragSort') {
    const items = it.opts || [];
    const hint = it.ans || '';
    const pickedYang = (saved && saved.yangPicks) || [];
    const pickedYin = (saved && saved.yinPicks) || [];
    const itemHTML = items.map((item, i) => {
      const inYang = pickedYang.includes(i);
      const inYin = pickedYin.includes(i);
      const cls = inYang ? 'choice-opt selected' : inYin ? 'choice-opt selected' : 'choice-opt';
      const tag = inYang ? ' ☀' : inYin ? ' ☽' : '';
      return `<button class="${cls}" onclick="sortYinYang(${day},${i},this)">${item}${tag}</button>`;
    }).join('');
    html = `<div class="content-interaction-desc" style="margin-bottom:8px">點擊歸類（第一次 = 陽，第二次 = 陰，第三次 = 取消）</div>
      <div class="choice-grid" id="sort-${day}">${itemHTML}</div>
      <div style="margin-top:8px;font-size:0.7857em;color:var(--text-dim);font-weight:300">${hint}</div>`;

  } else if (it.type === 'eightCards') {
    const GUA = ['乾','坤','震','巽','坎','離','艮','兌'];
    const SYM = ['☰','☷','☳','☴','☵','☲','☶','☱'];
    const items = it.opts || [];
    const flipped = (saved && saved.flipped) || [];
    const cardHTML = items.map((item, i) => {
      const isFlipped = flipped.includes(i);
      const parts = item.split('：');
      const front = SYM[i] || parts[0];
      const back = item;
      return `<div class="gua-card${isFlipped ? ' flipped' : ''}" onclick="flipCard(${day},${i},this)">
        <div class="gua-card-front">${front}</div>
        <div class="gua-card-back">${back}</div>
      </div>`;
    }).join('');
    html = `<div class="gua-card-grid">${cardHTML}</div>`;

  } else if (it.type === 'trigramBuilder') {
    const yao = (saved && saved.yao) || [1, 1, 1];
    const rows = [2, 1, 0].map(i => {
      const isYang = yao[i];
      return `<div class="yao-toggle">
        <button class="yao-btn" onclick="toggleYao(${day},${i},this)">${isYang ? '—' : '- -'}</button>
        <span class="yao-label">第 ${i + 1} 爻</span>
      </div>`;
    }).join('');
    const key = yao.map(v => v ? '1' : '0').join('');
    const gua = GUA_MAP[key];
    html = `<div class="line-builder">${rows}</div>
      <div class="gua-result" id="gua-result-${day}">${gua ? gua.symbol + ' ' + gua.name + '卦' : '組合中…'}</div>`;

  } else if (it.type === 'hexagramComposer') {
    const guaNames = ['乾','坤','震','巽','坎','離','艮','兌'];
    const guaSyms = ['☰','☷','☳','☴','☵','☲','☶','☱'];
    const upperIdx = (saved && saved.hcUpper !== undefined) ? saved.hcUpper : null;
    const lowerIdx = (saved && saved.hcLower !== undefined) ? saved.hcLower : null;
    const makeOpts = (which) => guaNames.map((g, i) => {
      const val = which === 'upper' ? upperIdx : lowerIdx;
      const sel = val === i ? 'choice-opt selected' : 'choice-opt';
      return `<button class="${sel}" onclick="selectHC(${day},'${which}',${i},this)">${guaSyms[i]}${g}</button>`;
    }).join('');
    const resultText = (upperIdx !== null && lowerIdx !== null)
      ? `${guaSyms[upperIdx]}${guaNames[upperIdx]}（上）+ ${guaSyms[lowerIdx]}${guaNames[lowerIdx]}（下）`
      : '請選擇上卦與下卦';
    html = `<div style="margin-bottom:8px">
      <div style="font-size:0.7143em;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:5px;font-weight:700">上卦</div>
      <div class="choice-grid">${makeOpts('upper')}</div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:0.7143em;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:5px;font-weight:700">下卦</div>
      <div class="choice-grid">${makeOpts('lower')}</div>
    </div>
    <div style="font-size:0.8571em;color:var(--text);font-weight:300;padding:8px 0" id="hc-result-${day}">${resultText}</div>`;

  } else if (it.type === 'guidedPractice') {
    const steps = it.opts || [];
    const doneSteps = (saved && saved.gpDone) || [];
    const stepHTML = steps.map((s, i) => {
      const done = doneSteps.includes(i);
      return `<div class="gp-step${done ? ' done' : ''}" onclick="toggleGP(${day},${i},this)">
        <div class="gp-check">${done ? '✓' : ''}</div>
        <span>${s}</span>
      </div>`;
    }).join('');
    html = `<div class="gp-steps">${stepHTML}</div>`;
  }

  if (!html) return '';

  return `<div class="content-block">
    <div class="content-block-label">${it.title || '今日互動'}</div>
    <div class="content-interaction-desc" style="margin-bottom:8px">${it.q}</div>
    ${html}
    ${it.ans && it.type !== 'multipleChoice' ? `<div style="font-size:0.7857em;color:var(--text-dim);margin-top:8px;font-weight:300">${it.ans}</div>` : ''}
  </div>`;
}

function answerRich(day, idx, btn) {
  const rich = RICH.find(d => d.day === day);
  if (!rich) return;
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey].richAnswered = true;
  state[stateKey].richPick = idx;
  saveState(state);
  const opts = btn.closest('.quiz-opts').querySelectorAll('.quiz-opt');
  opts.forEach((b, i) => {
    b.disabled = true;
    const o = rich.it.opts[i];
    const correct = typeof o === 'object' ? o.ok : false;
    if (correct) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  const exp = document.getElementById(`rich-exp-${day}`);
  if (exp) exp.classList.add('show');
}

function sortYinYang(day, idx, btn) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  let yang = state[stateKey].yangPicks || [];
  let yin = state[stateKey].yinPicks || [];
  if (yang.includes(idx)) {
    yang = yang.filter(i => i !== idx);
    yin = [...yin, idx];
  } else if (yin.includes(idx)) {
    yin = yin.filter(i => i !== idx);
  } else {
    yang = [...yang, idx];
  }
  state[stateKey].yangPicks = yang;
  state[stateKey].yinPicks = yin;
  saveState(state);
  const rich = RICH.find(d => d.day === day);
  renderTodayContent(day);
}

function flipCard(day, idx, el) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  let flipped = state[stateKey].flipped || [];
  if (flipped.includes(idx)) flipped = flipped.filter(i => i !== idx);
  else flipped = [...flipped, idx];
  state[stateKey].flipped = flipped;
  saveState(state);
  el.classList.toggle('flipped');
}

function selectHC(day, which, idx, btn) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey][which === 'upper' ? 'hcUpper' : 'hcLower'] = idx;
  saveState(state);
  renderTodayContent(day);
}

function toggleGP(day, idx, el) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  let done = state[stateKey].gpDone || [];
  if (done.includes(idx)) done = done.filter(i => i !== idx);
  else done = [...done, idx];
  state[stateKey].gpDone = done;
  saveState(state);
  el.classList.toggle('done');
  el.querySelector('.gp-check').textContent = done.includes(idx) ? '✓' : '';
}

function toggleAcc(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.acc-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

function answerQuiz(day, idx, btn) {
  const course = COURSE.find(d => d.day === day);
  if (!course || !course.quiz) return;
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey].quizAnswered = true;
  state[stateKey].quizPick = idx;
  saveState(state);

  const opts = btn.closest('.quiz-opts').querySelectorAll('.quiz-opt');
  opts.forEach((b, i) => {
    b.disabled = true;
    if (course.quiz.opts[i] === course.quiz.ans) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  const exp = document.getElementById(`quiz-exp-${day}`);
  if (exp) exp.classList.add('show');
}

function toggleContent(day) {
  const body = document.getElementById(`content-body-${day}`);
  const icon = document.getElementById(`content-toggle-${day}`);
  const isOpen = body.classList.toggle('open');
  icon.classList.toggle('open', isOpen);
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey].open = isOpen;
  saveState(state);
}

function selectChoice(day, idx, btn) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey].choice = idx;
  saveState(state);
  btn.closest('.choice-grid').querySelectorAll('.choice-opt').forEach((b,i) => {
    b.classList.toggle('selected', i === idx);
  });
}

function toggleYao(day, yaoIdx, btn) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  let yao = state[stateKey].yao || [1,1,1];
  yao[yaoIdx] = yao[yaoIdx] ? 0 : 1;
  state[stateKey].yao = yao;
  saveState(state);
  btn.textContent = yao[yaoIdx] ? '—' : '- -';
  const key = yao.map(v => v ? '1' : '0').join('');
  const gua = GUA_MAP[key];
  const el = document.getElementById(`gua-result-${day}`);
  if (el) el.textContent = gua ? `${gua.symbol} ${gua.name}卦` : '組合中…';
}

function throwCoin(day, idx) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  let yao = state[stateKey].coinYao || [];
  yao[idx] = Math.random() < 0.5 ? 1 : 0;
  state[stateKey].coinYao = yao;
  saveState(state);
  renderTodayContent(day);
}

function resetCoin(day) {
  const stateKey = `interact_${day}`;
  state[stateKey] = state[stateKey] || {};
  state[stateKey].coinYao = [];
  saveState(state);
  renderTodayContent(day);
}

function renderToday() {

  const task = TASKS[todayDay - 1];
  const taskState = state.tasks[todayDay] || {};

  const dayLabel = document.getElementById('today-day-label');
  if (dayLabel) dayLabel.textContent = `第 ${todayDay} 天 / 30`;
  document.getElementById('today-quote').textContent = getTodayQuote();

  // week badge
  const wb = document.getElementById('today-week-badge');
  wb.innerHTML = `<span class="week-badge ${WEEK_CLASS[task.week]}">${WEEK_NAMES[task.week]}｜${WEEK_THEMES[task.week]}</span>`;

  // task card
  const card = document.getElementById('today-task-card');
  const isDone = !!taskState.done;
  card.innerHTML = `
    <div class="today-card-title">第 ${task.day} 天｜${task.name.slice(0, -1)}</div>

      <span>${WEEK_NAMES[task.week]}</span>

      <span style="font-size:0.9286em;color:${isDone ? '#3d6b50' : '#666660'}">
        ${isDone ? '已完成' : '標記完成'}
      </span>
    </div>
    ${isDone ? `<div class="done-msg" style="margin-top:12px">${DONE_MSGS[todayDay % DONE_MSGS.length]}</div>` : ''}
    <div style="margin-top:12px">
      <div style="font-size:0.7857em;color:#aaaaaa;margin-bottom:4px;letter-spacing:0.05em">備 註</div>

    </div>

function toggleTodayTask() {
  const todayDay = getTodayDay();
  const t = state.tasks[todayDay] || {};
  t.done = !t.done;
  if (t.done) t.doneAt = new Date().toISOString();
  else delete t.doneAt;
  state.tasks[todayDay] = t;
  saveState(state);
  renderStats();
  renderToday();
  renderTaskList();
}

function saveTodayNote() {
  const todayDay = getTodayDay();
  const t = state.tasks[todayDay] || {};
  t.note = document.getElementById('today-note')?.value || '';
  state.tasks[todayDay] = t;
  saveState(state);
}

function saveTodayDiary() {
  const todayDay = getTodayDay();
  const entry = {};
  DIARY_FIELDS.forEach(f => {
    entry[f.key] = document.getElementById(`diary-today-${f.key}`)?.value || '';
  });

function clearTodayDiary() {
  DIARY_FIELDS.forEach(f => {

    if (el) el.value = '';
  });
}

// ── Page: Tasks ───────────────────────────────────────────────────────

function renderTaskList() {
  const container = document.getElementById('task-list');
  const filtered = TASKS.filter(t => {
    if (currentFilter === 'done') return state.tasks[t.day]?.done;
    if (currentFilter === 'undone') return !state.tasks[t.day]?.done;
    if (currentFilter === 'week1') return t.week === 1;
    if (currentFilter === 'week2') return t.week === 2;
    if (currentFilter === 'week3') return t.week === 3;
    if (currentFilter === 'week4') return t.week === 4;
    return true;
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">○</div>目前沒有符合條件的任務</div>`;
    return;
  }

  container.innerHTML = filtered.map(task => {
    const ts = state.tasks[task.day] || {};
    const done = !!ts.done;
    return `
      <div class="task-item ${done ? 'completed' : ''}" id="task-item-${task.day}">
        <div class="task-check ${done ? 'checked' : ''}" onclick="toggleTask(${task.day})"></div>
        <div class="task-info">
          <div class="task-name">第 ${task.day} 天｜${task.name.slice(0, -1)}</div>
          <div class="task-meta-row">
            <span class="week-badge ${WEEK_CLASS[task.week]}">${WEEK_NAMES[task.week]}</span>
            <span class="task-meta-item">${task.theme}</span>
            ${ts.doneAt ? `<span class="task-done-time">完成於 ${ts.doneAt.slice(0,10)}</span>` : ''}
          </div>
          <textarea class="task-note-input" placeholder="備註……" onblur="saveTaskNote(${task.day}, this)">${ts.note || ''}</textarea>
        </div>
      </div>
    `;
  }).join('');
}

function toggleTask(day) {
  const t = state.tasks[day] || {};
  t.done = !t.done;
  if (t.done) t.doneAt = new Date().toISOString();
  else delete t.doneAt;
  state.tasks[day] = t;
  saveState(state);
  renderStats();
  renderTaskList();
  if (day === getTodayDay()) renderToday();
}

function saveTaskNote(day, el) {
  const t = state.tasks[day] || {};
  t.note = el.value;
  state.tasks[day] = t;
  saveState(state);
}

});

let diaryGridOpen = false;

function buildDiaryGrid() {
  const grid = document.getElementById('diary-day-grid');

  grid.innerHTML = TASKS.map(t => {
    const hasDiary = !!(state.diaries[t.day]?.savedAt);

    return `<div class="diary-day-cell${isActive ? ' active' : ''}${hasDiary ? ' has-diary' : ''}"

  const btn = document.getElementById('diary-grid-toggle');
  grid.classList.toggle('open', diaryGridOpen);

function renderDiaryPage() {
  const task = TASKS[currentDiaryDay - 1];

// ── Page: Review ──────────────────────────────────────────────────────

function renderReview() {
  const container = document.getElementById('review-list');
  const days = Object.keys(state.diaries)
    .filter(k => state.diaries[k]?.savedAt)
    .map(Number)
    .sort((a, b) => b - a);

  if (!days.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">冊</div>尚無已儲存的日記</div>`;
    return;
  }

  container.innerHTML = `<div class="review-grid">` + days.map(day => {
    const entry = state.diaries[day];
    const task = TASKS[day - 1];
    const preview = entry.learned || entry.gua || '（無內容）';
    return `
      <div class="review-card" onclick="openDiaryDay(${day})">
        <div class="review-card-day">
          <span class="review-card-tag"></span>
          第 ${day} 天｜${entry.savedAt?.slice(0,10) || ''}
        </div>
        <div class="review-card-title">${task.name.slice(0,-1)}</div>
        <div class="review-card-preview">${preview}</div>
      </div>
    `;
  }).join('') + `</div>`;
}

function openDiaryDay(day) {
  currentDiaryDay = day;
  navigateTo('diary');
}

// ── Stories Page ──────────────────────────────────────────────────────

let currentStoryTag = '全部';

function renderStories() {
  const allTags = ['全部', ...new Set(STORIES.flatMap(s => s.tags))];
  const filterBar = document.getElementById('story-filter-bar');
  filterBar.innerHTML = allTags.map(tag =>
    `<button class="story-tag-btn ${tag === currentStoryTag ? 'active' : ''}"
      onclick="filterStories('${tag}')">${tag}</button>`
  ).join('');

  const filtered = currentStoryTag === '全部'
    ? STORIES
    : STORIES.filter(s => s.tags.includes(currentStoryTag));

  const container = document.getElementById('story-list');
  container.innerHTML = `<div class="story-grid">${filtered.map(s => `
    <div class="story-card" onclick="openStory(${s.id})">
      <div class="story-card-head">
        <div class="story-card-gua">
          <span class="story-gua-sym">${s.guaSym}</span>
          <span class="story-gua-name">${s.gua}</span>
        </div>
        <div class="story-card-title">${s.title}</div>
        <div class="story-card-hero">主角：${s.hero}</div>
      </div>
      <div class="story-card-body">
        <div class="story-card-preview">${s.preview}</div>
        <div class="story-card-wisdom">${s.wisdom.slice(0, 55)}…</div>
      </div>
    </div>`).join('')}</div>`;
}

function filterStories(tag) {
  currentStoryTag = tag;
  renderStories();
}

function openStory(id) {
  const s = STORIES.find(s => s.id === id);
  if (!s) return;

  const charHTML = s.characters
    ? `<div class="story-section">
        <div class="story-section-label">相關人物</div>
        <div class="story-char-row">${s.characters.map(c => `<span class="story-char-tag">${c}</span>`).join('')}</div>
      </div>` : '';

  const overlay = document.createElement('div');
  overlay.className = 'story-modal-overlay';
  overlay.innerHTML = `
    <div class="story-modal">
      <div class="story-modal-header">
        <div>
          <div class="story-card-gua" style="margin-bottom:6px">
            <span class="story-gua-sym">${s.guaSym}</span>
            <span class="story-gua-name">${s.gua}</span>
          </div>
          <div class="story-card-title" style="font-size:1.2857em">${s.title}</div>
          <div class="story-card-hero" style="margin-top:4px">主角：${s.hero}</div>
        </div>
        <button class="story-modal-close" onclick="closeStory()">✕</button>
      </div>
      <div class="story-modal-body">
        ${charHTML}
        <div class="story-section">
          <div class="story-section-label">故事</div>
          <div class="story-section-text">${s.story.replace(/\n\n/g, '</div><div class="story-section-text" style="margin-top:10px">')}</div>
        </div>
        <div class="story-section">
          <div class="story-section-label">易經哲理</div>
          <div class="story-wisdom-block">${s.wisdom}</div>
        </div>
        <div class="story-section">
          <div class="story-section-label">今日經典</div>
          <div class="story-section-text" style="font-family:'Noto Serif TC',serif;font-size:1.0em;letter-spacing:0.06em;color:var(--text-mid)">${s.classic}</div>
        </div>
        <div class="story-section">
          <div class="story-char-row">${s.tags.map(t => `<span class="story-char-tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    </div>`;

  overlay.addEventListener('click', e => { if (e.target === overlay) closeStory(); });
  document.body.appendChild(overlay);
}

function closeStory() {
  const overlay = document.querySelector('.story-modal-overlay');
  if (overlay) overlay.remove();
}

// ── Navigation ────────────────────────────────────────────────────────

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelector(`.nav-btn[data-page="${page}"]`)?.classList.add('active');

  if (page === 'today') renderToday();
  if (page === 'tasks') renderTaskList();
  if (page === 'diary') renderDiaryPage();
  if (page === 'review') renderReview();
  if (page === 'stories') renderStories();
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => navigateTo(btn.dataset.page));
});

// ── UI Preferences ────────────────────────────────────────────────────

const FONT_SIZES = [12, 13, 14, 16, 18, 20];
let fontSizeIdx = 2; // default 14px

function changeFontSize(dir) {
  fontSizeIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSizeIdx + dir));
  applyFontSize();
  localStorage.setItem('iching_fontsize', fontSizeIdx);
}

function applyFontSize() {
  document.documentElement.style.setProperty('--fs', FONT_SIZES[fontSizeIdx] + 'px');
}

function toggleFont() {
  const body = document.body;
  const btn = document.getElementById('font-toggle-btn');
  const isSerif = body.classList.toggle('font-serif');
  btn.textContent = isSerif ? '黑' : '明';
  btn.classList.toggle('active', isSerif);
  localStorage.setItem('iching_font', isSerif ? 'serif' : 'sans');
}

function toggleDark() {
  const body = document.body;
  const btn = document.getElementById('dark-toggle-btn');
  const isDark = body.classList.toggle('dark-mode');
  btn.textContent = isDark ? '☀' : '☽';
  btn.classList.toggle('active', isDark);
  localStorage.setItem('iching_dark', isDark ? '1' : '0');
  // Update star brightness
  updateStars(isDark);
}

function restorePrefs() {
  const font = localStorage.getItem('iching_font');
  const dark = localStorage.getItem('iching_dark');
  const sizeIdx = localStorage.getItem('iching_fontsize');
  if (font === 'serif') {
    document.body.classList.add('font-serif');
    const btn = document.getElementById('font-toggle-btn');
    if (btn) { btn.textContent = '黑'; btn.classList.add('active'); }
  }
  if (dark === '1') {
    document.body.classList.add('dark-mode');
    const btn = document.getElementById('dark-toggle-btn');
    if (btn) { btn.textContent = '☀'; btn.classList.add('active'); }
    updateStars(true);
  }
  if (sizeIdx !== null) {
    fontSizeIdx = parseInt(sizeIdx);
    applyFontSize();
  }
}

// ── Stars ─────────────────────────────────────────────────────────────

(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let isDarkMode = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 3500);
    for (let i = 0; i < count; i++) {
      const hue = [220, 240, 280, 260, 200][Math.floor(Math.random() * 5)];
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random() * 0.8 + 0.15,
        speed: Math.random() * 0.4 + 0.05,
        phase: Math.random() * Math.PI * 2,
        hue,
      });
    }
  }

  window.updateStars = function(dark) {
    isDarkMode = dark;
  };

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.008;
    stars.forEach(s => {
      const alpha = s.a * (0.7 + 0.3 * Math.sin(t * s.speed + s.phase));
      if (isDarkMode) {
        // Coloured glowing stars for cosmic mode
        const size = s.r * 1.6;
        const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, size * 2.5);
        grd.addColorStop(0, `hsla(${s.hue},80%,95%,${alpha})`);
        grd.addColorStop(0.4, `hsla(${s.hue},70%,80%,${alpha * 0.5})`);
        grd.addColorStop(1, `hsla(${s.hue},60%,70%,0)`);
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        // Bright core
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(80,80,70,${alpha * 0.28})`;
        ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  draw();
})();

restorePrefs();
